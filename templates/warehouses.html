<!DOCTYPE html>
<html>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f1f5f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1e293b;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* Buttons */
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        .btn-delete {
            background: #dc2626;
        }

        .btn-delete-all {
            background: #000;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Table */
        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2563eb;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f9fafb;
        }
    </style>
<head><title>Warehouses</title></head>
<body>

    <div class="sidebar">
    <h2>🚀 Supply Chain</h2>
    <a href="/">🏠 Dashboard</a>
    <a href="/history">📊 Order History</a>
    <a href="/add_warehouse"">➕ Add Warehouse</a>
    <a href="/warehouses">📋 View Warehouses</a>
</div>

<div class="main">

<h2>Warehouse List</h2>

    <div class="card">

        <div class="table-container">

<table>
<tr>
    <th>Name</th>
    <th>City</th>
    <th>Stock</th>
</tr>

{% for w in data %}
<tr>
    <td>{{ w[1] }}</td>
    <td>{{ w[2] }}</td>
    <td>{{ w[3] }}</td>
</tr>
{% endfor %}

</table>
       </div>

    </div>
</div>
</body>
</html>
